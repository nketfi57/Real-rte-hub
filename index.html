<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTE Hub | Plateforme Interne</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <!-- Lucide Icons pour des icônes pro sans emojis -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .particle {
            position: absolute;
            background: rgba(0, 174, 239, 0.15);
            border-radius: 50%;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] h-screen overflow-hidden font-sans antialiased relative">

    <!-- ARRIÈRE-PLAN DE PARTICULES + GLOW -->
    <div id="particle-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-sky-200/20 rounded-full blur-[120px] pointer-events-none z-0"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-blue-200/15 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <!-- ==================== 1. ÉCRAN D'AUTHENTIFICATION ==================== -->
    <div id="login-screen" class="fixed inset-0 flex justify-center items-center z-50 p-4 bg-sky-50/50 backdrop-blur-sm">
        <div id="login-card" class="bg-white/90 backdrop-blur-xl p-10 rounded-3xl shadow-[-20px_20px_60px_rgba(0,0,0,0.05)] w-full max-w-md border border-white/60 relative">
            
            <div class="flex justify-center mb-6">
                <img src="logo.png" alt="RTE" class="h-12 w-auto object-contain logo-rte">
            </div>

            <div class="flex bg-slate-100 p-1 rounded-xl mb-8">
                <button id="tab-login" class="flex-1 py-2.5 text-sm font-bold text-sky-600 bg-white shadow-sm rounded-lg transition-all">Se connecter</button>
                <button id="tab-register" class="flex-1 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-800 transition-all">Créer un compte</button>
            </div>

            <div id="auth-form-step1">
                <h2 id="auth-title" class="text-xl font-bold text-slate-800 mb-1 text-center">RTE HUB</h2>
                <p id="auth-subtitle" class="text-xs text-slate-400 mb-6 text-center">Accès réservé au personnel du réseau</p>
                
                <div id="name-field" class="h-0 opacity-0 overflow-hidden transition-all duration-300">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Nom complet</label>
                    <input id="name-input" type="text" placeholder="Jean Dupont" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-sky-400 focus:bg-white transition-all mb-4 text-sm">
                </div>

                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Adresse e-mail professionnelle</label>
                <input id="email-input" type="email" placeholder="prenom.nom@rte-france.com" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-sky-400 focus:bg-white transition-all mb-6 text-sm">
                
                <button id="auth-submit-btn" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-sky-500/20 hover:brightness-105 transition-all active:scale-[0.98]">
                    Obtenir le code de sécurité
                </button>
            </div>

            <div id="auth-form-step2" class="hidden opacity-0 transform translate-y-4">
                <h2 class="text-xl font-bold text-slate-800 mb-1 text-center">Double Authentification</h2>
                <p class="text-xs text-slate-400 mb-6 text-center">Entrez le code de validation reçu par e-mail</p>
                
                <div class="flex justify-center gap-2 mb-6">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500">
                    <input type="text" maxlength="1" class="otp-input w-12 h-14 text-center text-xl font-bold bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-sky-500">
                </div>

                <button id="verify-otp-btn" class="w-full bg-emerald-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-emerald-500/20 hover:brightness-105 transition-all">
                    Valider le code
                </button>
                <button id="back-auth-btn" class="w-full text-xs text-slate-400 font-semibold mt-4 hover:text-slate-600 transition-all">Retour</button>
            </div>
            <p id="auth-status" class="text-xs mt-4 text-center font-medium hidden"></p>
        </div>
    </div>

    <!-- ==================== 2. INTERFACE DASHBOARD AVEC BARRE EN HAUT ==================== -->
    <div id="dashboard-screen" class="h-screen w-full flex flex-col opacity-0 pointer-events-none z-10 relative">
        
        <!-- HEADER SUPÉRIEUR CENTRALISÉ -->
        <header class="bg-white border-b border-slate-100 px-8 py-4 flex items-center justify-between z-20 shadow-sm">
            <div class="flex items-center gap-6">
                <img src="logo.png" alt="RTE" class="h-8 w-auto object-contain">
                <div class="h-5 w-[1px] bg-slate-200"></div>
                <nav class="flex gap-2">
                    <button id="nav-directives" class="flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm border border-sky-100/50 transition-all">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Directives
                    </button>
                    <button id="nav-chat" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold text-sm transition-all relative">
                        <i data-lucide="message-square" class="w-4 h-4"></i> Tchat d'Équipe
                        <div id="chat-badge" class="absolute top-1 right-1 w-2 h-2 bg-sky-500 rounded-full hidden"></div>
                    </button>
                </nav>
            </div>

            <!-- Profil connecté (Haut à droite) -->
            <div class="flex items-center gap-4 relative">
                <div id="profile-trigger" class="flex items-center gap-3 cursor-pointer hover:bg-slate-50 p-1.5 rounded-2xl transition-all">
                    <div class="text-right">
                        <p id="user-name" class="text-sm font-bold text-slate-800">Chargement...</p>
                        <p id="user-role" class="text-[10px] font-bold text-slate-400 tracking-wider uppercase">Membre</p>
                    </div>
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=RTE" alt="Avatar" class="w-10 h-10 rounded-xl bg-slate-100 border border-slate-200 p-0.5">
                </div>

                <!-- MENU DÉROULANT DU PROFIL -->
                <div id="profile-dropdown" class="absolute right-0 top-14 bg-white border border-slate-100 rounded-2xl shadow-xl p-4 w-72 hidden opacity-0 transform translate-y-2 z-30 transition-all">
                    <h4 class="font-bold text-slate-800 text-sm mb-3 flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-slate-400"></i> Modifier mon profil</h4>
                    <div class="space-y-3 mb-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nom affiché</label>
                            <input id="edit-name-input" type="text" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-sky-400">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Avatar (Seed personnalisé)</label>
                            <input id="edit-avatar-input" type="text" placeholder="Ex: RTE-Agent-4" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-sky-400">
                        </div>
                    </div>
                    <button id="save-profile-btn" class="w-full bg-sky-500 text-white py-2 rounded-xl text-xs font-bold hover:bg-sky-600 transition-all mb-2 flex items-center justify-center gap-2">
                        <i data-lucide="check" class="w-3.5 h-3.5"></i> Enregistrer
                    </button>
                    <div class="border-t border-slate-100 my-2"></div>
                    <button id="logout-btn" class="w-full bg-rose-50 text-rose-600 py-2 rounded-xl text-xs font-bold hover:bg-rose-100 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="log-out" class="w-3.5 h-3.5"></i> Se déconnecter
                    </button>
                </div>
            </div>
        </header>

        <!-- ZONE DE VUE DYNAMIQUE -->
        <main class="flex-1 overflow-hidden relative w-full max-w-6xl mx-auto p-8">
            
            <!-- VUE A : DIRECTIVES -->
            <div id="view-directives" class="h-full space-y-6 overflow-y-auto pr-2">
                <div id="chef-zone" class="bg-gradient-to-br from-slate-900 to-sky-950 p-6 rounded-3xl shadow-xl border border-sky-900/30 text-white relative overflow-hidden">
                    <h3 class="font-bold text-sm mb-3 flex items-center gap-2 text-sky-400"><i data-lucide="megaphone" class="w-4 h-4"></i> Publier une note d'exploitation</h3>
                    <textarea id="announcement-input" placeholder="Écrivez une consigne ou une mise à jour d'exploitation..." rows="2" class="w-full p-4 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-sky-400 text-sm mb-3 backdrop-blur-sm"></textarea>
                    <div class="flex justify-end">
                        <button id="post-announcement-btn" class="bg-sky-500 text-white font-bold px-6 py-2 rounded-xl text-xs hover:bg-sky-600 shadow-md transition-all flex items-center gap-2">
                            <i data-lucide="send" class="w-3.5 h-3.5"></i> Diffuser la note
                        </button>
                    </div>
                </div>
                <div id="announcements-container" class="space-y-4"></div>
            </div>

            <!-- VUE B : CHAT D'ÉQUIPE -->
            <div id="view-chat" class="h-full bg-white border border-slate-100 rounded-3xl shadow-sm flex flex-col overflow-hidden hidden opacity-0 transform translate-y-4">
                <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm bg-slate-50/50"></div>
                <div class="p-4 border-t border-slate-100 bg-white">
                    <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200/50">
                        <input id="chat-input" type="text" placeholder="Votre message à l'équipe..." class="flex-1 bg-transparent px-3 py-2 text-sm focus:outline-none text-slate-700">
                        <button id="send-chat-btn" class="bg-sky-500 text-white h-9 w-9 rounded-xl font-bold hover:bg-sky-600 flex items-center justify-center transition-all">
                            <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ==================== 3. CONFIGURATION & LOGIQUE ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCFqbtCLxYcRDJ-4KvJBBGZ8lIbhE-dXds",
            authDomain: "rte-hub.firebaseapp.com",
            projectId: "rte-hub",
            storageBucket: "rte-hub.firebasestorage.app",
            messagingSenderId: "147630574938",
            appId: "1:147630574938:web:457679b08b18be8e93b763"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        lucide.createIcons();

        let isLoginTab = true;
        let actuelVue = 'directives';

        // --- GÉNÉRATEUR DE PARTICULES FINES ---
        const pContainer = document.getElementById('particle-container');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 2;
            p.style.width = `${size}px`;
            p.style.height = `${size}px`;
            p.style.left = `${Math.random() * 100}%`;
            p.style.top = `${Math.random() * 100}%`;
            pContainer.appendChild(p);
            gsap.to(p, { y: Math.random() * -80 - 40, opacity: Math.random() * 0.4, duration: Math.random() * 4 + 4, repeat: -1, yoyo: true, ease: "sine.inOut" });
        }

        // --- GESTION DES ONGLETS AUTH ---
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const nameField = document.getElementById('name-field');
        const authTitle = document.getElementById('auth-title');
        const authSubmitBtn = document.getElementById('auth-submit-btn');

        tabLogin.addEventListener('click', () => basculerOnglet(true));
        tabRegister.addEventListener('click', () => basculerOnglet(false));

        function basculerOnglet(isLogin) {
            if(isLogin === isLoginTab) return;
            isLoginTab = isLogin;
            if(isLogin) {
                tabLogin.className = "flex-1 py-2.5 text-sm font-bold text-sky-600 bg-white shadow-sm rounded-lg transition-all";
                tabRegister.className = "flex-1 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-800 transition-all";
                gsap.to(nameField, { height: 0, opacity: 0, duration: 0.25 });
                authTitle.innerText = "RTE HUB";
            } else {
                tabRegister.className = "flex-1 py-2.5 text-sm font-bold text-sky-600 bg-white shadow-sm rounded-lg transition-all";
                tabLogin.className = "flex-1 py-2.5 text-sm font-semibold text-slate-500 hover:text-slate-800 transition-all";
                gsap.to(nameField, { height: 76, opacity: 1, duration: 0.25 });
                authTitle.innerText = "Rejoindre le Hub";
            }
        }

        // --- LOGIQUE ENVOI EMAIL ---
        const authStatus = document.getElementById('auth-status');
        const step1 = document.getElementById('auth-form-step1');
        const step2 = document.getElementById('auth-form-step2');

        authSubmitBtn.addEventListener('click', async () => {
            const email = document.getElementById('email-input').value.trim();
            if(!email) return alert("Veuillez entrer votre email !");
            if(!isLoginTab && !document.getElementById('name-input').value.trim()) return alert("Entrez votre nom !");

            try {
                authStatus.classList.remove('hidden');
                authStatus.innerText = "Génération du jeton...";
                await sendSignInLinkToEmail(auth, email, { url: window.location.href, handleCodeInApp: true });
                window.localStorage.setItem('emailForSignIn', email);
                if(!isLoginTab) window.localStorage.setItem('nameForSignIn', document.getElementById('name-input').value.trim());

                gsap.to(step1, { opacity: 0, y: -10, duration: 0.3, onComplete: () => {
                    step1.classList.add('hidden');
                    step2.classList.remove('hidden');
                    gsap.to(step2, { opacity: 1, y: 0, duration: 0.3 });
                    document.querySelectorAll('.otp-input')[0].focus();
                }});
                authStatus.innerText = "📨 Code envoyé ! Vérifiez vos spams.";
                authStatus.className = "text-xs mt-4 text-center font-medium text-emerald-600";
            } catch (error) {
                authStatus.innerText = "Erreur d'envoi.";
                authStatus.className = "text-xs mt-4 text-center font-medium text-rose-500";
            }
        });

        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.target.value.length >= 1 && index < inputs.length - 1) inputs[index + 1].focus();
                if (e.key === 'Backspace' && index > 0) inputs[index - 1].focus();
            });
        });

        document.getElementById('verify-otp-btn').addEventListener('click', () => {
            alert("🔒 Double authentification activée : Cliquez sur le lien reçu dans l'e-mail pour confirmer l'accès.");
        });

        document.getElementById('back-auth-btn').addEventListener('click', () => {
            gsap.to(step2, { opacity: 0, y: 10, duration: 0.3, onComplete: () => {
                step2.classList.add('hidden');
                step1.classList.remove('hidden');
                gsap.to(step1, { opacity: 1, y: 0, duration: 0.3 });
            }});
        });

        // --- INTERCEPTION DU RETOUR LIEN ---
        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) email = window.prompt('Confirmez votre e-mail RTE :');
            
            signInWithEmailLink(auth, email, window.location.href)
                .then(async (result) => {
                    const savedName = window.localStorage.getItem('nameForSignIn');
                    if(savedName) {
                        await setDoc(doc(db, "users", result.user.uid), { displayName: savedName, avatarSeed: savedName });
                    }
                    window.localStorage.removeItem('emailForSignIn');
                    window.localStorage.removeItem('nameForSignIn');
                    window.history.replaceState({}, document.title, window.location.pathname);
                });
        }

        // --- CYCLE DE CONNEXION / DÉCONNEXION ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                let finalName = user.email.split('@')[0].replace('.', ' ');
                let avatarSeed = finalName;

                if(userDoc.exists()) {
                    finalName = userDoc.data().displayName || finalName;
                    avatarSeed = userDoc.data().avatarSeed || avatarSeed;
                }

                document.getElementById('user-name').innerText = finalName;
                document.getElementById('edit-name-input').value = finalName;
                document.getElementById('edit-avatar-input').value = avatarSeed;
                document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${avatarSeed}`;

                document.getElementById('login-screen').classList.add('hidden');
                gsap.to("#dashboard-screen", { opacity: 1, pointerEvents: "auto", duration: 0.5 });
                activerTempsReel();
            } else {
                document.getElementById('dashboard-screen').style.opacity = "0";
                document.getElementById('dashboard-screen').style.pointerEvents = "none";
                document.getElementById('login-screen').classList.remove('hidden');
                gsap.fromTo("#login-card", {opacity:0, y:20}, {opacity:1, y:0, duration:0.5});
            }
        });

        // --- NAVIGATION DYNAMIQUE ---
        const btnDirectives = document.getElementById('nav-directives');
        const btnChat = document.getElementById('nav-chat');
        const viewDirectives = document.getElementById('view-directives');
        const viewChat = document.getElementById('view-chat');

        btnDirectives.addEventListener('click', () => basculerVue('directives'));
        btnChat.addEventListener('click', () => basculerVue('chat'));

        function basculerVue(vue) {
            if(vue === actuelVue) return;
            actuelVue = vue;

            if(vue === 'directives') {
                btnDirectives.className = "flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm border border-sky-100/50 transition-all";
                btnChat.className = "flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold text-sm transition-all relative";
                
                gsap.to(viewChat, { opacity: 0, y: 10, duration: 0.2, onComplete: () => {
                    viewChat.classList.add('hidden');
                    viewDirectives.classList.remove('hidden');
                    gsap.fromTo(viewDirectives, { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.3 });
                }});
            } else {
                btnChat.className = "flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm border border-sky-100/50 transition-all relative";
                btnDirectives.className = "flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold text-sm transition-all";
                document.getElementById('chat-badge').classList.add('hidden');

                gsap.to(viewDirectives, { opacity: 0, y: -10, duration: 0.2, onComplete: () => {
                    viewDirectives.classList.add('hidden');
                    viewChat.classList.remove('hidden');
                    gsap.fromTo(viewChat, { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.3 });
                    const chatBox = document.getElementById('chat-messages');
                    chatBox.scrollTop = chatBox.scrollHeight;
                }});
            }
        }

        // --- GESTION MENU PROFIL ---
        const profileTrigger = document.getElementById('profile-trigger');
        const profileDropdown = document.getElementById('profile-dropdown');

        profileTrigger.addEventListener('click', (e) => {
            e.stopPropagation();
            if(profileDropdown.classList.contains('hidden')) {
                profileDropdown.classList.remove('hidden');
                gsap.to(profileDropdown, { opacity: 1, y: 0, duration: 0.2 });
            } else {
                fermerDropdown();
            }
        });

        window.addEventListener('click', () => { fermerDropdown(); });
        profileDropdown.addEventListener('click', (e) => e.stopPropagation());

        function fermerDropdown() {
            gsap.to(profileDropdown, { opacity: 0, y: 10, duration: 0.2, onComplete: () => {
                profileDropdown.classList.add('hidden');
            }});
        }

        document.getElementById('save-profile-btn').addEventListener('click', async () => {
            const newName = document.getElementById('edit-name-input').value.trim();
            const newSeed = document.getElementById('edit-avatar-input').value.trim();
            if(!newName) return alert("Le nom ne peut pas être vide");

            await setDoc(doc(db, "users", auth.currentUser.uid), { displayName: newName, avatarSeed: newSeed }, { merge: true });
            document.getElementById('user-name').innerText = newName;
            document.getElementById('user-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${newSeed}`;
            fermerDropdown();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.reload(); });
        });

        // --- ENGINE FIRESTORE TEMPS RÉEL (AVEC SUPPRESSION COUTUMIÈRE) ---
        function activerTempsReel() {
            const announcementsContainer = document.getElementById('announcements-container');
            const chatMessages = document.getElementById('chat-messages');

            // Notes du Chef
            const qAnnouncements = query(collection(db, "announcements"), orderBy("timestamp", "desc"));
            onSnapshot(qAnnouncements, (snapshot) => {
                announcementsContainer.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "announcement-card bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col justify-between";
                    card.innerHTML = `
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2 text-sky-600 font-bold text-xs tracking-wider uppercase">
                                <i data-lucide="shield-alert" class="w-3.5 h-3.5"></i> Note d'Exploitation
                            </div>
                            <span class="text-[10px] text-slate-400 font-semibold">${data.timestamp ? new Date(data.timestamp.seconds*1000).toLocaleDateString() : 'A l\'instant'}</span>
                        </div>
                        <p class="text-slate-600 text-sm leading-relaxed">${data.content}</p>
                    `;
                    announcementsContainer.appendChild(card);
                });
                lucide.createIcons();
                gsap.from(".announcement-card", { opacity: 0, y: 10, duration: 0.3, stagger: 0.05 });
            });

            document.getElementById('post-announcement-btn').addEventListener('click', async () => {
                const input = document.getElementById('announcement-input');
                if(!input.value.trim()) return;
                await addDoc(collection(db, "announcements"), { content: input.value.trim(), timestamp: new Date() });
                input.value = '';
            });

            // Chat d'équipe + Gestion Bouton Supprimer Dynamique
            let initialLoad = true;
            const qChat = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(qChat, (snapshot) => {
                chatMessages.innerHTML = '';
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const msgId = docSnap.id;
                    const isMe = data.senderId === auth.currentUser.uid;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `max-w-[75%] p-3.5 rounded-2xl shadow-sm text-sm relative group transition-all ${isMe ? 'bg-sky-500 text-white ml-auto rounded-tr-none' : 'bg-white text-slate-700 border border-slate-100 rounded-tl-none'}`;
                    
                    // Si c'est MON message, on injecte un petit bouton de suppression en haut à droite
                    const deleteBtnHtml = isMe 
                        ? `<button data-msg-id="${msgId}" class="delete-msg-btn absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-sky-200 hover:text-white transition-all p-1 rounded-lg hover:bg-sky-600/50">
                               <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                           </button>` 
                        : '';

                    msgDiv.innerHTML = `
                        <p class="text-[9px] font-bold ${isMe ? 'text-sky-200 pr-5' : 'text-slate-400'} mb-1 tracking-wider uppercase">${data.senderName}</p>
                        <p class="leading-relaxed font-medium">${data.text}</p>
                        ${deleteBtnHtml}
                    `;
                    chatMessages.appendChild(msgDiv);
                });
                
                // Rendre les icônes des poubelles opérationnelles
                lucide.createIcons();
                
                // Attacher l'événement de suppression sur chaque bouton généré
                document.querySelectorAll('.delete-msg-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        e.stopPropagation();
                        const idDuMessage = btn.getAttribute('data-msg-id');
                        if (confirm("Voulez-vous vraiment supprimer ce message ?")) {
                            try {
                                await deleteDoc(doc(db, "messages", idDuMessage));
                            } catch (err) {
                                alert("Erreur lors de la suppression : " + err.message);
                            }
                        }
                    });
                });

                chatMessages.scrollTop = chatMessages.scrollHeight;

                if (!initialLoad && actuelVue !== 'chat') {
                    document.getElementById('chat-badge').classList.remove('hidden');
                }
                initialLoad = false;
            });

            document.getElementById('send-chat-btn').addEventListener('click', envoyerMessage);
            document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') envoyerMessage(); });

            async function envoyerMessage() {
                const input = document.getElementById('chat-input');
                if(!input.value.trim()) return;
                
                const curUser = auth.currentUser;
                const userDoc = await getDoc(doc(db, "users", curUser.uid));
                let finalName = curUser.email.split('@')[0];
                if(userDoc.exists()) finalName = userDoc.data().displayName || finalName;

                await addDoc(collection(db, "messages"), {
                    text: input.value.trim(),
                    senderId: curUser.uid,
                    senderName: finalName,
                    timestamp: new Date()
                });
                input.value = '';
            }
        }
    </script>
</body>
</html>
