<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTE Hub | Espace Équipe</title>
    <!-- Tailwind CSS pour le look moderne bleu/blanc -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP pour les animations premium -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body class="bg-slate-50 h-screen overflow-hidden font-sans">

    <!-- ==================== 1. PAGE DE CONNEXION ==================== -->
    <div id="login-screen" class="fixed inset-0 flex justify-center items-center bg-sky-50 z-50">
        <div id="login-card" class="bg-white p-10 rounded-3xl shadow-2xl w-96 border border-sky-100 text-center">
            <div class="w-16 h-16 bg-sky-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-sky-200">
                <span class="text-white font-black text-xl">RTE</span>
            </div>
            <h1 class="text-slate-800 text-2xl font-bold mb-2">RTE HUB</h1>
            <p class="text-slate-400 text-sm mb-6">Connexion sécurisée par lien magique</p>
            
            <input id="email-input" type="email" placeholder="prenom.nom@rte-france.com" 
                class="w-full p-3 mb-4 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-sky-400 transition-all">
            
            <button id="login-btn" class="w-full bg-sky-500 text-white py-3 rounded-xl font-bold hover:bg-sky-600 shadow-lg shadow-sky-100 transition-all active:scale-95">
                Recevoir le lien d'accès
            </button>
            <p id="login-status" class="text-xs mt-4 text-slate-500 hidden"></p>
        </div>
    </div>

    <!-- ==================== 2. INTERFACE DASHBOARD (Cachée au départ) ==================== -->
    <div id="dashboard-screen" class="h-screen w-full flex opacity-0 pointer-events-none">
        
        <!-- SIDEBAR GAUCHE -->
        <aside class="w-64 bg-white border-r border-slate-100 flex flex-col justify-between p-6">
            <div>
                <!-- Logo -->
                <div class="flex items-center gap-3 mb-8 px-2">
                    <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center text-white font-bold text-xs">RTE</div>
                    <span class="font-bold text-slate-800 text-lg tracking-wide">RTE HUB</span>
                </div>
                <!-- Menu -->
                <nav class="space-y-1">
                    <a href="#" class="flex items-center gap-3 px-4 py-3 bg-sky-50 text-sky-600 rounded-xl font-semibold text-sm transition-all">
                        📊 Dashboard / Annonces
                    </a>
                </nav>
            </div>

            <!-- Profil Utilisateur en Bas de la Sidebar -->
            <div class="border-t border-slate-100 pt-4 flex items-center gap-3">
                <div class="relative group cursor-pointer">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=RTE" alt="Avatar" class="w-10 h-10 rounded-xl bg-sky-50 border border-slate-200">
                    <div class="absolute inset-0 bg-black/40 rounded-xl opacity-0 group-hover:opacity-100 flex items-center justify-center text-[10px] text-white transition-all">Édit</div>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="user-name" class="text-sm font-semibold text-slate-800 truncate cursor-pointer hover:text-sky-500">Agent RTE</p>
                    <p id="user-role" class="text-xs text-slate-400 truncate">Équipe Technique</p>
                </div>
            </div>
        </aside>

        <!-- ZONE DE CONTENU PRINCIPALE (Grille 2 colonnes) -->
        <main class="flex-1 grid grid-cols-3 overflow-hidden">
            
            <!-- COLONNE 1 & 2 : ANNONCES DU CHEF (Flux principal) -->
            <section class="col-span-2 p-8 overflow-y-auto space-y-6">
                <div class="flex justify-between items-center mb-2">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-800">Fil d'actualité</h2>
                        <p class="text-sm text-slate-400">Les dernières directives de votre chef d'équipe</p>
                    </div>
                </div>

                <!-- Zone d'écriture exclusive au Chef (Simulée pour l'instant) -->
                <div id="chef-zone" class="bg-gradient-to-r from-sky-500 to-sky-600 p-6 rounded-2xl shadow-xl shadow-sky-100 text-white">
                    <h3 class="font-bold text-lg mb-2">📢 Publier une note d'équipe</h3>
                    <textarea id="announcement-input" placeholder="Une mise à jour importante, un code de sécurité..." rows="2" 
                        class="w-full p-3 rounded-xl text-slate-800 focus:outline-none text-sm mb-3"></textarea>
                    <div class="flex justify-end">
                        <button id="post-announcement-btn" class="bg-white text-sky-600 font-bold px-5 py-2 rounded-xl text-sm hover:bg-sky-50 transition-all active:scale-95">
                            Diffuser l'alerte
                        </button>
                    </div>
                </div>

                <!-- Conteneur des Annonces -->
                <div id="announcements-container" class="space-y-4">
                    <!-- Les annonces s'inséreront ici dynamiquement -->
                </div>
            </section>

            <!-- COLONNE 3 : GROUP CHAT D'ÉQUIPE -->
            <section class="bg-white border-l border-slate-100 flex flex-col h-full">
                <!-- Header Chat -->
                <div class="p-4 border-b border-slate-100 flex items-center gap-3">
                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                    <div>
                        <h3 class="font-bold text-slate-800 text-sm">Canal Équipe RTE</h3>
                        <p class="text-[11px] text-slate-400">Échanges instantanés</p>
                    </div>
                </div>

                <!-- Zone des messages du chat -->
                <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm">
                    <!-- Les messages du chat s'inséreront ici dynamiquement -->
                </div>

                <!-- Input Chat -->
                <div class="p-4 border-t border-slate-100">
                    <div class="flex gap-2">
                        <input id="chat-input" type="text" placeholder="Écrire un message..." 
                            class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-400">
                        <button id="send-chat-btn" class="bg-sky-500 text-white px-4 rounded-xl font-bold hover:bg-sky-600 transition-all active:scale-95">
                            ➔
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- ==================== 3. CONFIGURATION & LOGIQUE FIREBASE ==================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendSignInLinkToEmail, isSignInWithEmailLink, signInWithEmailLink, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCFqbtCLxYcRDJ-4KvJBBGZ8lIbhE-dXds",
            authDomain: "rte-hub.firebaseapp.com",
            projectId: "rte-hub",
            storageBucket: "rte-hub.firebasestorage.app",
            messagingSenderId: "147630574938",
            appId: "1:147630574938:web:457679b08b18be8e93b763"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- ANIMATION INITIALE GSAP (Page de login) ---
        gsap.from("#login-card", { opacity: 0, scale: 0.9, y: 30, duration: 1, ease: "power4.out" });

        // --- ÉTAPE A : GESTION DU LIEN MAGIQUE DE CONNEXION ---
        const loginBtn = document.getElementById('login-btn');
        const emailInput = document.getElementById('email-input');
        const loginStatus = document.getElementById('login-status');

        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if(!email) return alert("Rentre ton adresse mail RTE !");

            const actionCodeSettings = {
                url: window.location.href, // Renvoie l'utilisateur sur cette même page
                handleCodeInApp: true,
            };

            try {
                loginStatus.classList.remove('hidden');
                loginStatus.innerText = "Envoi du lien en cours...";
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                loginStatus.innerText = "📨 Lien magique envoyé ! Vérifie tes e-mails.";
                loginStatus.className = "text-xs mt-4 text-emerald-600 font-medium";
            } catch (error) {
                console.error(error);
                loginStatus.innerText = "Erreur lors de l'envoi du mail.";
                loginStatus.className = "text-xs mt-4 text-rose-500 font-medium";
            }
        });

        // --- ÉTAPE B : VÉRIFICATION DU RETOUR DE L'E-MAIL ---
        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                email = window.prompt('Veuillez confirmer votre e-mail pour la connexion :');
            }
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    // Nettoyer l'URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                })
                .catch((error) => console.error("Erreur d'authentification :", error));
        }

        // --- ÉTAPE C : TRANSITION ANIMÉE ET ÉCOUTE EN TEMPS RÉEL ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Remplir les infos du profil
                document.getElementById('user-name').innerText = user.email.split('@')[0].replace('.', ' ');
                
                // Animation de transition GSAP : Disparition login -> Apparition Dashboard
                const tl = gsap.timeline();
                tl.to("#login-screen", { opacity: 0, duration: 0.5, onComplete: () => {
                    document.getElementById('login-screen').classList.add('hidden');
                }});
                tl.to("#dashboard-screen", { opacity: 1, pointerEvents: "auto", duration: 0.5 });
                
                // Activer le temps réel pour les annonces et le chat
                activerTempsReel();
            }
        });

        // --- ÉTAPE D : FONCTIONNALITÉS EN TEMPS RÉEL (FIRESTORE) ---
        function activerTempsReel() {
            const announcementsContainer = document.getElementById('announcements-container');
            const chatMessages = document.getElementById('chat-messages');

            // 1. Charger et Écouter les Annonces
            const qAnnouncements = query(collection(db, "announcements"), orderBy("timestamp", "desc"));
            onSnapshot(qAnnouncements, (snapshot) => {
                announcementsContainer.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "announcement-card bg-white p-5 rounded-2xl border border-slate-100 shadow-sm border-l-4 border-l-sky-500";
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-xs font-bold text-sky-600 bg-sky-50 px-2.5 py-1 rounded-md">NOTE DU CHEF</span>
                            <span class="text-[10px] text-slate-400">${data.timestamp ? new Date(data.timestamp.seconds*1000).toLocaleDateString() : 'À l\'instant'}</span>
                        </div>
                        <p class="text-slate-700 text-sm leading-relaxed">${data.content}</p>
                    `;
                    announcementsContainer.appendChild(card);
                });
                // Animation GSAP cascade sur les nouvelles annonces
                gsap.from(".announcement-card", { opacity: 0, y: 15, duration: 0.4, stagger: 0.1 });
            });

            // 2. Écrire une Annonce (Chef)
            document.getElementById('post-announcement-btn').addEventListener('click', async () => {
                const input = document.getElementById('announcement-input');
                if(!input.value.trim()) return;
                await addDoc(collection(db, "announcements"), {
                    content: input.value.trim(),
                    timestamp: new Date()
                });
                input.value = '';
            });

            // 3. Charger et Écouter le Chat d'équipe
            const qChat = query(collection(db, "messages"), orderBy("timestamp", "asc"));
            onSnapshot(qChat, (snapshot) => {
                chatMessages.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const msgDiv = document.createElement('div');
                    msgDiv.className = "chat-msg bg-slate-50 p-3 rounded-xl max-w-[85%]";
                    msgDiv.innerHTML = `
                        <p class="text-[10px] font-bold text-slate-500 mb-0.5">${data.sender}</p>
                        <p class="text-slate-700">${data.text}</p>
                    `;
                    chatMessages.appendChild(msgDiv);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight; // Scroll automatique
                gsap.from(".chat-msg:last-child", { opacity: 0, scale: 0.95, y: 5, duration: 0.2 });
            });

            // 4. Envoyer un message sur le Chat
            document.getElementById('send-chat-btn').addEventListener('click', envoyerMessage);
            document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') envoyerMessage(); });

            async function envoyerMessage() {
                const input = document.getElementById('chat-input');
                if(!input.value.trim()) return;
                await addDoc(collection(db, "messages"), {
                    text: input.value.trim(),
                    sender: auth.currentUser.email.split('@')[0],
                    timestamp: new Date()
                });
                input.value = '';
            }
        }
    </script>
</body>
</html>
