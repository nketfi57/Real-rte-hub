<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTE Hub | Espace Exploitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <style>
        .particle {
            position: absolute;
            background: rgba(0, 174, 239, 0.15);
            border-radius: 50%;
            pointer-events: none;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        @keyframes crown-float {
            0%, 100% { transform: translateY(0) rotate(-4deg); }
            50% { transform: translateY(-3px) rotate(4deg); }
        }
        .animate-crown { animation: crown-float 2.5s ease-in-out infinite; }

        @keyframes pulse-online {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }
        .animate-pulse-online { animation: pulse-online 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#f8fafc] h-screen overflow-hidden font-sans antialiased relative">

    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col gap-3 w-full max-w-sm pointer-events-none"></div>

    <div id="particle-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>
    <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-sky-200/20 rounded-full blur-[120px] pointer-events-none z-0"></div>

    <div id="login-screen" class="fixed inset-0 flex justify-center items-center z-50 p-4 bg-sky-50/50 backdrop-blur-sm">
        <div id="login-card" class="bg-white/90 backdrop-blur-xl p-10 rounded-3xl shadow-[-20px_20px_60px_rgba(0,0,0,0.05)] w-full max-w-md border border-white/60 relative">
            <div class="flex justify-center mb-6"><img src="logo.png" alt="RTE" class="h-12 w-auto object-contain"></div>
            
            <div id="auth-form-step1">
                <h2 class="text-xl font-bold text-slate-800 mb-1 text-center">RTE HUB</h2>
                <p class="text-xs text-slate-400 mb-6 text-center">Connexion requise via l'infrastructure d'entreprise Microsoft 365</p>
                
                <button id="microsoft-sso-btn" class="w-full bg-[#2f2f2f] hover:bg-black text-white py-3.5 rounded-xl font-bold text-sm shadow-md transition-all flex items-center justify-center gap-3 active:scale-[0.99]">
                    <svg class="w-4 h-4" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0 0H11V11H0V0Z" fill="#F25022"/>
                        <path d="M12 0H23V11H12V0Z" fill="#7FBA00"/>
                        <path d="M0 12H11V23H0V12Z" fill="#00A4EF"/>
                        <path d="M12 12H23V23H12V12Z" fill="#FFB900"/>
                    </svg>
                    Connexion Professionnelle Microsoft 365
                </button>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="h-screen w-full flex flex-col opacity-0 pointer-events-none z-10 relative">
        <header class="bg-white border-b border-slate-100 px-8 py-4 flex items-center justify-between z-20 shadow-sm">
            <div class="flex items-center gap-6">
                <img src="logo.png" alt="RTE" class="h-8 w-auto object-contain">
                <div class="h-5 w-[1px] bg-slate-200"></div>
                <nav class="flex gap-2">
                    <button id="nav-directives" class="flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm border border-sky-100/50 transition-all">
                        <i data-lucide="file-text" class="w-4 h-4"></i> Notes d'exploitation
                    </button>
                    <button id="nav-chat" class="flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold text-sm transition-all relative">
                        <i data-lucide="message-square" class="w-4 h-4"></i> Échanges d'équipe
                        <div id="chat-badge" class="absolute -top-1 -right-1 bg-rose-500 text-white font-extrabold text-[10px] h-5 min-w-5 px-1.5 rounded-full flex items-center justify-center border-2 border-white shadow-sm hidden">0</div>
                    </button>
                </nav>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center gap-1.5 bg-slate-100 text-slate-600 text-xs px-2.5 py-1.5 rounded-xl font-bold">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse-online"></span>
                    <span id="live-users-count">1</span> au quart
                </div>

                <div class="flex items-center gap-4 relative">
                    <div id="profile-trigger" class="flex items-center gap-3 cursor-pointer hover:bg-slate-50 p-1.5 rounded-2xl transition-all">
                        <div class="text-right flex flex-col items-end gap-0.5">
                            <div class="flex items-center gap-1.5">
                                <span id="chef-badge-header" class="hidden items-center gap-1 bg-amber-500/10 border border-amber-500/20 text-amber-600 text-[10px] font-extrabold px-1.5 py-0.5 rounded-md uppercase tracking-wider">
                                    <i data-lucide="crown" class="w-3 h-3 text-amber-500 animate-crown"></i> Chef
                                </span>
                                <p id="user-name" class="text-sm font-bold text-slate-800">Synchro...</p>
                            </div>
                            <div class="flex items-center gap-1">
                                <span id="teams-status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                                <p id="teams-status-text" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Teams : Statut distant</p>
                            </div>
                        </div>
                        <img id="user-avatar" src="" alt="Avatar" class="w-10 h-10 rounded-xl bg-slate-100 border border-slate-200 object-cover p-0.5">
                    </div>

                    <div id="profile-dropdown" class="absolute right-0 top-14 bg-white border border-slate-100 rounded-2xl shadow-xl p-5 w-80 hidden opacity-0 z-30 transition-all">
                        <div class="border-b border-slate-100 pb-3 mb-4">
                            <h5 class="text-xs font-bold text-slate-700 mb-2">Habilitation d'exploitation</h5>
                            <div id="manager-status-box" class="mb-2"></div>
                            <div id="manager-upgrade-zone" class="space-y-2">
                                <input id="manager-password-input" type="password" placeholder="Mot de passe d'habilitation" class="w-full p-2 bg-slate-50 border border-slate-200 rounded-lg text-xs focus:outline-none focus:border-sky-400">
                                <button id="upgrade-role-btn" class="w-full bg-slate-800 text-slate-200 py-2 rounded-lg text-[11px] font-bold">Activer droits Manager</button>
                            </div>
                        </div>
                        <button id="logout-btn" class="w-full bg-rose-50 text-rose-600 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-100 transition-all flex items-center justify-center gap-2">Se déconnecter de Microsoft 365</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-hidden relative w-full max-w-6xl mx-auto p-6 flex gap-6">
            
            <div id="view-directives" class="h-full flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 overflow-hidden">
                
                <div class="lg:col-span-2 space-y-4 overflow-y-auto pr-2 h-full pb-6">
                    <div class="bg-white border border-slate-100 p-3 rounded-2xl shadow-sm flex items-center gap-3">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 ml-2"></i>
                        <input id="search-notes-input" type="text" placeholder="Filtrer une directive, consigne ou auteur en direct..." class="bg-transparent text-sm text-slate-700 flex-1 focus:outline-none">
                    </div>

                    <div id="chef-zone" class="bg-gradient-to-br from-slate-900 to-sky-950 p-5 rounded-3xl shadow-xl text-white relative overflow-hidden hidden">
                        <h3 class="font-bold text-xs mb-2 flex items-center gap-2 text-sky-400"><i data-lucide="megaphone" class="w-4 h-4"></i> Diffuser une nouvelle directive d'exploitation</h3>
                        <textarea id="announcement-input" placeholder="Consigne de conduite du réseau, travaux, alerte météo..." rows="2" class="w-full p-3.5 rounded-2xl bg-white/10 text-white placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-sky-400 text-xs mb-2"></textarea>
                        <div class="flex justify-end"><button id="post-announcement-btn" class="bg-sky-500 text-white font-bold px-5 py-1.5 rounded-xl text-[11px] hover:bg-sky-600 flex items-center gap-2">Publier la note</button></div>
                    </div>

                    <div id="announcements-container" class="space-y-4"></div>
                </div>

                <div class="bg-white border border-slate-100 rounded-3xl p-5 shadow-sm h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-xs text-slate-800 uppercase tracking-wider flex items-center gap-2">
                            <i data-lucide="folder-git" class="w-4 h-4 text-sky-500"></i> SharePoint En Direct
                        </h3>
                        <button id="sync-sharepoint-btn" class="text-slate-400 hover:text-sky-500 transition-all">
                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <div id="sharepoint-loading" class="text-xs text-slate-400 italic py-4 flex items-center gap-2"><i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> En attente de connexion...</div>
                    <div id="sharepoint-files-container" class="flex-1 overflow-y-auto space-y-2.5 pr-1 hidden"></div>
                </div>
            </div>

            <div id="view-chat" class="h-full bg-white border border-slate-100 rounded-3xl shadow-sm flex flex-col overflow-hidden hidden opacity-0 transform translate-y-4 flex-1">
                <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-4 text-sm bg-slate-50/50 flex flex-col"></div>
                <div class="p-4 border-t border-slate-100 bg-white">
                    <div class="flex gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200/50">
                        <input id="chat-input" type="text" placeholder="Écrire un message à l'équipe de quart..." class="flex-1 bg-transparent px-3 py-2 text-sm focus:outline-none text-slate-700">
                        <button id="send-chat-btn" class="bg-sky-500 text-white h-9 w-9 rounded-xl flex items-center justify-center"><i data-lucide="arrow-right" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, query, orderBy, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION FIREBASE BASE DE DONNÉES CHAT/NOTES
        const firebaseConfig = {
            apiKey: "AIzaSyCFqbtCLxYcRDJ-4KvJBBGZ8lIbhE-dXds",
            authDomain: "rte-hub.firebaseapp.com",
            projectId: "rte-hub",
            storageBucket: "rte-hub.firebasestorage.app",
            messagingSenderId: "147630574938",
            appId: "1:147630574938:web:457679b08b18be8e93b763"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // =========================================================================
        // 🛠️ CONFIGURATION OFFICIELLE AZURE AD MICROSOFT (A REMPLIR PAR VOTRE DSI)
        // =========================================================================
        const MICROSOFT_CONFIG = {
            auth: {
                clientId: "VOTRE_CLIENT_ID_AZURE_APP_ICI", // Exemple: "43cc4a12-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
                authority: "https://login.microsoftonline.com/VOTRE_TENANT_ID_ICI", // Votre ID Locataire RTE
                redirectUri: window.location.origin + window.location.pathname
            },
            cache: {
                cacheLocation: "sessionStorage",
                storeAuthStateInCookie: false
            }
        };

        const SHAREPOINT_SITE_ID = "VRAI_ID_DE_VOTRE_SITE_SHAREPOINT"; // À récupérer depuis Graph Explorer

        // Définition des permissions d'accès requises (Profil, Statut Teams et Fichiers SharePoint)
        const loginRequest = {
            scopes: ["User.Read", "Presence.Read", "Files.Read.All"]
        };

        const msalInstance = new msal.PublicClientApplication(MICROSOFT_CONFIG);
        let accountId = null;
        let accessToken = null;
        let userRole = 'Opérateur';
        let actuelVue = 'directives';
        let unreadCount = 0;

        lucide.createIcons();

        // Initialisation de la pile audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'chat') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(450, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(650, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.start(); osc.stop(audioCtx.currentTime + 0.12);
            }
        }

        function createToast(message, status = 'info') {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            let statusIcon = 'info', borderColor = 'border-white/40';
            if (status === 'success') { statusIcon = 'check-circle'; borderColor = 'border-emerald-500/30'; }
            toast.className = `pointer-events-auto bg-white/80 backdrop-blur-md px-4 py-3.5 rounded-2xl border ${borderColor} shadow-lg flex items-center gap-3 w-full opacity-0 transform translate-x-12`;
            toast.innerHTML = `<div class="${status === 'success' ? 'text-emerald-500' : 'text-sky-500'}"><i data-lucide="${statusIcon}" class="w-5 h-5"></i></div><div class="text-xs font-bold text-slate-700 flex-1">${message}</div>`;
            container.appendChild(toast); lucide.createIcons();
            gsap.to(toast, { opacity: 1, x: 0, duration: 0.4 });
            setTimeout(() => gsap.to(toast, { opacity: 0, x: 20, onComplete: () => toast.remove() }), 4000);
        }

        // --- GESTION ENTRÉE EN SESSIONS REELLE VIA MICROSOFT SSO ---
        document.getElementById('microsoft-sso-btn').addEventListener('click', async () => {
            try {
                const loginResponse = await msalInstance.loginPopup(loginRequest);
                msalInstance.setActiveAccount(loginResponse.account);
                handleResponse(loginResponse);
            } catch (error) {
                console.error("Erreur d'authentification Microsoft AD", error);
                createToast("Échec de la connexion Microsoft.", "error");
            }
        });

        // Lecture de la session au chargement de la page
        msalInstance.handleRedirectPromise().then(response => {
            const currentAccounts = msalInstance.getAllAccounts();
            if (currentAccounts.length > 0) {
                msalInstance.setActiveAccount(currentAccounts[0]);
                acquireTokenAndFetchData();
            }
        });

        async function acquireTokenAndFetchData() {
            const account = msalInstance.getActiveAccount();
            if (!account) return;
            try {
                const tokenResponse = await msalInstance.acquireTokenSilent({
                    ...loginRequest,
                    account: account
                });
                accessToken = tokenResponse.accessToken;
                handleResponse(tokenResponse);
            } catch (error) {
                if (error instanceof msal.InteractionRequiredAuthError) {
                    msalInstance.acquireTokenPopup(loginRequest).then(tokenResponse => {
                        accessToken = tokenResponse.accessToken;
                        handleResponse(tokenResponse);
                    });
                }
            }
        }

        async function handleResponse(response) {
            const user = response.account;
            const userEmail = user.username;
            const uid = user.localAccountId;
            
            // Photo Microsoft Graph (ou fallback structuré sur les initiales/noms si non définie en GED)
            const photoUrl = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(user.name)}`;

            // Chargement/Persistance du rôle métier via le Firestore RTE local
            const userDoc = await getDoc(doc(db, "users", uid));
            if(userDoc.exists()) {
                userRole = userDoc.data().role || 'Opérateur';
            } else {
                await setDoc(doc(db, "users", uid), { displayName: user.name, email: userEmail, role: 'Opérateur' }, { merge: true });
            }

            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-avatar').src = photoUrl;

            // Déclenchement des flux d'API Microsoft Réels
            fetchRealTeamsStatus();
            fetchRealSharePointFiles();

            majInterfaceRole();
            document.getElementById('login-screen').classList.add('hidden');
            gsap.to("#dashboard-screen", { opacity: 1, pointerEvents: "auto", duration: 0.5 });
            activerTempsReel(uid, user.name, photoUrl);
        }

        // =========================================================================
        // 📡 APPELS API MICROSOFT GRAPH REELS (ZÉRO SIMULATION)
        // =========================================================================
        
        // 1. Récupération du vrai statut Teams
        async function fetchRealTeamsStatus() {
            if (!accessToken) return;
            try {
                const response = await fetch("https://graph.microsoft.com/v1.0/me/presence", {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const presenceData = await response.json();
                // Valeurs API Graph possibles : Available, Busy, DoNotDisturb, Away, etc.
                const status = presenceData.availability;
                
                const dot = document.getElementById('teams-status-dot');
                const text = document.getElementById('teams-status-text');
                text.innerText = `Teams : ${status}`;
                
                if (status === "Available") dot.className = "w-2 h-2 rounded-full bg-emerald-500";
                else if (status === "Busy" || status === "DoNotDisturb") dot.className = "w-2 h-2 rounded-full bg-rose-500";
                else dot.className = "w-2 h-2 rounded-full bg-amber-500";
            } catch (err) {
                console.error("Impossible de joindre l'état Teams via Microsoft Graph", err);
            }
        }

        // 2. Récupération des vrais fichiers SharePoint de l'espace de conduite
        async function fetchRealSharePointFiles() {
            if (!accessToken) return;
            const container = document.getElementById('sharepoint-files-container');
            const loader = document.getElementById('sharepoint-loading');
            try {
                const response = await fetch(`https://graph.microsoft.com/v1.0/sites/${SHAREPOINT_SITE_ID}/drive/root/children`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                
                loader.classList.add('hidden');
                container.classList.remove('hidden');
                container.innerHTML = '';

                if(data.value && data.value.length > 0) {
                    data.value.forEach(file => {
                        const div = document.createElement('div');
                        div.className = "p-3 bg-slate-50 hover:bg-sky-50/50 rounded-xl border border-slate-100 transition-all flex items-center justify-between group cursor-pointer";
                        div.innerHTML = `
                            <div class="flex items-center gap-3">
                                <i data-lucide="file-text" class="w-5 h-5 text-blue-500"></i>
                                <div class="max-w-[180px] overflow-hidden">
                                    <p class="text-xs font-bold text-slate-700 truncate">${file.name}</p>
                                    <p class="text-[10px] text-slate-400 font-medium">Taille : ${(file.size/1024).toFixed(1)} KB</p>
                                </div>
                            </div>
                            <a href="${file.webUrl}" target="_blank" class="text-slate-300 group-hover:text-sky-500 transition-all"><i data-lucide="external-link" class="w-3 h-3"></i></a>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = `<p class="text-xs text-slate-400 italic">Aucun document trouvé dans la racine SharePoint.</p>`;
                }
                lucide.createIcons();
            } catch (err) {
                loader.innerHTML = `<span class="text-rose-500 font-medium">Erreur d'accès à l'API SharePoint</span>`;
                console.error("Erreur de récupération SharePoint", err);
            }
        }

        document.getElementById('sync-sharepoint-btn').addEventListener('click', () => {
            playSound('success');
            fetchRealSharePointFiles();
            fetchRealTeamsStatus();
        });

        // --- INTERFACE PARAMÈTRES ET DECONNEXION REELLE ---
        function majInterfaceRole() {
            document.getElementById('user-role').innerText = userRole;
            const isManager = userRole === 'Manager';
            document.getElementById('chef-zone').classList.toggle('hidden', !isManager);
            document.getElementById('chef-badge-header').style.display = isManager ? 'inline-flex' : 'none';
            document.getElementById('manager-status-box').innerHTML = isManager 
                ? `<span class="text-xs font-bold text-amber-600 bg-amber-50 p-2 rounded-lg border border-amber-200 block">Profil habilité Manager</span>`
                : `<span class="text-xs text-slate-500 bg-slate-100 p-2 rounded-lg block">Rôle standard (Lecture)</span>`;
            document.getElementById('manager-upgrade-zone').classList.toggle('hidden', isManager);
            lucide.createIcons();
        }

        document.getElementById('upgrade-role-btn').addEventListener('click', async () => {
            const currentAccount = msalInstance.getActiveAccount();
            if(document.getElementById('manager-password-input').value === 'GmrLorraine2026' && currentAccount) {
                userRole = 'Manager';
                await setDoc(doc(db, "users", currentAccount.localAccountId), { role: 'Manager' }, { merge: true });
                majInterfaceRole(); playSound('success'); createToast("Habilitation validée !", "success");
                document.getElementById('profile-dropdown').classList.add('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            msalInstance.logoutPopup().then(() => window.location.reload());
        });

        // --- NAVIGATION INTERNE ---
        const btnDirectives = document.getElementById('nav-directives'); const btnChat = document.getElementById('nav-chat');
        const viewDirectives = document.getElementById('view-directives'); const viewChat = document.getElementById('view-chat');
        btnDirectives.addEventListener('click', () => basculerVue('directives')); btnChat.addEventListener('click', () => basculerVue('chat'));

        function basculerVue(vue) {
            if(vue === actuelVue) return; actuelVue = vue;
            btnDirectives.className = vue === 'directives' ? "flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm border border-sky-100/50" : "flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold text-sm";
            btnChat.className = vue === 'chat' ? "flex items-center gap-2 px-4 py-2 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm border border-sky-100/50 relative" : "flex items-center gap-2 px-4 py-2 text-slate-600 hover:bg-slate-50 rounded-xl font-semibold text-sm relative";
            if(vue === 'chat') { unreadCount = 0; document.getElementById('chat-badge').classList.add('hidden'); }
            gsap.to(vue === 'chat' ? viewDirectives : viewChat, { opacity: 0, y: 10, duration: 0.2, onComplete: () => {
                (vue === 'chat' ? viewDirectives : viewChat).classList.add('hidden');
                (vue === 'chat' ? viewChat : viewDirectives).classList.remove('hidden');
                gsap.fromTo(vue === 'chat' ? viewChat : viewDirectives, { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.2 });
                if(vue === 'chat') { const cb = document.getElementById('chat-messages'); cb.scrollTop = cb.scrollHeight; }
            }});
        }

        document.getElementById('profile-trigger').addEventListener('click', (e) => { 
            e.stopPropagation(); 
            const dropdown = document.getElementById('profile-dropdown');
            dropdown.classList.toggle('hidden'); 
            gsap.fromTo(dropdown, { opacity: 0, y: -10 }, { opacity: 1, y: 0 }); 
        });
        window.addEventListener('click', () => document.getElementById('profile-dropdown').classList.add('hidden'));

        // ==================== ENGINE TEMPS REEL FIRESTORE ====================
        function activerTempsReel(userUid, myFullName, myAvatar) {
            const announcementsContainer = document.getElementById('announcements-container');
            const chatMessages = document.getElementById('chat-messages');

            onSnapshot(collection(db, "users"), (snap) => { document.getElementById('live-users-count').innerText = snap.size || 1; });

            // --- FLUX DES NOTES / DIRECTIVES ---
            let allDirectivesElements = [];
            onSnapshot(query(collection(db, "announcements"), orderBy("timestamp", "desc")), (snapshot) => {
                announcementsContainer.innerHTML = ''; allDirectivesElements = [];
                snapshot.forEach((annSnap) => {
                    const data = annSnap.data(); const id = annSnap.id;
                    const isCreator = data.creatorId === userUid;
                    const card = document.createElement('div');
                    card.className = "bg-white p-5 rounded-2xl border border-slate-100 shadow-sm relative flex gap-4 opacity-0 transform -translate-y-2";
                    card.setAttribute('data-search-text', `${data.content} ${data.creatorName}`.toLowerCase());

                    card.innerHTML = `
                        <img src="${data.creatorAvatar}" class="w-10 h-10 rounded-xl border object-cover bg-slate-50 mt-1 flex-shrink-0">
                        <div class="flex-1">
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-xs font-bold text-slate-800 flex items-center gap-1.5">
                                    ${data.creatorName} ${data.creatorRole === 'Manager' ? '<span class="bg-amber-100 text-amber-700 font-extrabold text-[9px] px-1 rounded">CHEF</span>':''}
                                </span>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] text-slate-400 font-semibold">${data.timestamp ? new Date(data.timestamp.seconds*1000).toLocaleDateString() : ''}</span>
                                    ${isCreator ? `<button data-id="${id}" class="del-ann text-slate-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>` : ''}
                                </div>
                            </div>
                            <p class="text-slate-700 text-xs font-medium leading-relaxed mb-3">${data.content}</p>
                            
                            <div class="border-t border-slate-50 pt-2.5">
                                <div id="comments-list-${id}" class="space-y-2 mb-2 max-h-40 overflow-y-auto"></div>
                                <div class="flex gap-2">
                                    <input id="comment-input-${id}" type="text" placeholder="Répondre ou accuser réception..." class="flex-1 bg-slate-50 border border-slate-100 px-3 py-1 rounded-xl text-xs focus:outline-none focus:border-sky-400">
                                    <button data-id="${id}" class="post-comm-btn bg-sky-50 text-sky-600 px-3 py-1 rounded-xl text-xs font-bold hover:bg-sky-500 hover:text-white transition-all">Accuser</button>
                                </div>
                            </div>
                        </div>
                    `;
                    announcementsContainer.appendChild(card);
                    gsap.to(card, { opacity: 1, y: 0, duration: 0.2 });
                    allDirectivesElements.push(card);

                    onSnapshot(query(collection(db, `announcements/${id}/comments`), orderBy("timestamp", "asc")), (commSnap) => {
                        const list = document.getElementById(`comments-list-${id}`); if(!list) return;
                        list.innerHTML = '';
                        commSnap.forEach((cDoc) => {
                            const cData = cDoc.data(); const div = document.createElement('div');
                            div.className = "bg-slate-50/70 p-2 rounded-xl text-xs flex gap-2 items-start";
                            div.innerHTML = `<img src="${cData.senderAvatar}" class="w-5 h-5 rounded bg-white border flex-shrink-0 object-cover mt-0.5">
                                <div><span class="font-bold text-slate-700 text-[10px]">${cData.senderName}</span><p class="text-slate-600">${cData.text}</p></div>`;
                            list.appendChild(div);
                        });
                    });
                });
                lucide.createIcons();

                document.querySelectorAll('.del-ann').forEach(b => b.addEventListener('click', async () => { if(confirm("Archiver ?")) await deleteDoc(doc(db, "announcements", b.getAttribute('data-id'))); }));
                document.querySelectorAll('.post-comm-btn').forEach(b => b.addEventListener('click', async () => {
                    const annId = b.getAttribute('data-id'); const input = document.getElementById(`comment-input-${annId}`);
                    if(!input.value.trim()) return;
                    await addDoc(collection(db, `announcements/${annId}/comments`), {
                        text: input.value.trim(), senderId: userUid, senderName: myFullName, senderAvatar: myAvatar, timestamp: new Date()
                    });
                    input.value = ''; playSound('success');
                }));
            });

            document.getElementById('search-notes-input').addEventListener('input', (e) => {
                const searchVal = e.target.value.toLowerCase();
                allDirectivesElements.forEach(card => {
                    card.style.display = card.getAttribute('data-search-text').includes(searchVal) ? 'flex' : 'none';
                });
            });

            document.getElementById('post-announcement-btn').addEventListener('click', async () => {
                const text = document.getElementById('announcement-input').value.trim(); if(!text) return;
                await addDoc(collection(db, "announcements"), {
                    content: text, timestamp: new Date(), creatorId: userUid, creatorName: myFullName, creatorRole: userRole, creatorAvatar: myAvatar
                });
                document.getElementById('announcement-input').value = ''; playSound('success');
            });

            // --- FLUX CHAT AVEC VRAIS INTEGRATIONS VISUELLES AVATARS MICROSOFT ---
            let initChat = true;
            onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
                chatMessages.innerHTML = '';
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added" && !initChat) {
                        playSound('chat');
                        if (actuelVue !== 'chat') {
                            unreadCount++;
                            document.getElementById('chat-badge').innerText = unreadCount;
                            document.getElementById('chat-badge').classList.remove('hidden');
                            createToast(`Message de ${change.doc.data().senderName}`, "info");
                        }
                    }
                });

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data(); const isMe = data.senderId === userUid;
                    const containerMsg = document.createElement('div');
                    containerMsg.className = `flex gap-3 max-w-[85%] items-end ${isMe ? 'ml-auto flex-row-reverse' : 'mr-auto'}`;
                    
                    containerMsg.innerHTML = `
                        <img src="${data.senderAvatar}" class="w-8 h-8 rounded-lg border object-cover bg-white mb-0.5 flex-shrink-0 shadow-sm" title="${data.senderName}">
                        <div class="p-3 rounded-2xl text-xs relative group shadow-sm ${isMe ? 'bg-sky-500 text-white rounded-br-none' : 'bg-white text-slate-700 border border-slate-100 rounded-bl-none'}">
                            <p class="text-[9px] font-bold ${isMe ? 'text-sky-100':'text-slate-400'} mb-0.5 uppercase tracking-wider">${data.senderName}</p>
                            <p class="font-medium leading-relaxed">${data.text}</p>
                            ${isMe ? `<button data-id="${docSnap.id}" class="del-msg absolute top-1 right-1 opacity-0 group-hover:opacity-100 text-sky-200 hover:text-white p-0.5"><i data-lucide="x" class="w-3 h-3"></i></button>`:''}
                        </div>
                    `;
                    chatMessages.appendChild(containerMsg);
                });
                lucide.createIcons();
                document.querySelectorAll('.del-msg').forEach(b => b.addEventListener('click', async () => await deleteDoc(doc(db, "messages", b.getAttribute('data-id')))));
                chatMessages.scrollTop = chatMessages.scrollHeight;
                initChat = false;
            });

            const chatInput = document.getElementById('chat-input');
            async function envoyerChat() {
                if(!chatInput.value.trim()) return;
                await addDoc(collection(db, "messages"), {
                    text: chatInput.value.trim(), senderId: userUid, senderName: myFullName, senderRole: userRole, senderAvatar: myAvatar, timestamp: new Date()
                });
                chatInput.value = '';
            }
            document.getElementById('send-chat-btn').addEventListener('click', envoyerChat);
            chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') envoyerChat(); });
        }
    </script>
</body>
</html>
